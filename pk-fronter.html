<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PK Fronter</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1c20;
    --surface:   #22252b;
    --surface2:  #2a2e37;
    --border:    #333740;
    --text:      #e8eaf0;
    --muted:     #8b90a0;
    --accent:    #7c6fff;
    --fronting:  #4ade80;
    --radius:    14px;
    --font: 'Nunito', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #7c6fff 0%, #a78bfa 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .system-tag {
    font-size: 12px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px; color: var(--muted);
  }

  /* ── Token setup screen ── */
  #setup {
    max-width: 440px; margin: 80px auto; padding: 0 20px;
  }
  .setup-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px;
  }
  .setup-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .setup-card p { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .setup-card code {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 7px; font-family: monospace; font-size: 13px;
    color: #a78bfa;
  }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .field input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: var(--font); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 12px; background: var(--accent);
    color: #fff; border: none; border-radius: 10px;
    font-family: var(--font); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .err { font-size: 13px; color: #f87171; margin-top: 10px; display: none; }

  /* ── Main app ── */
  #app { display: none; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    padding: 18px 20px 8px;
  }

  /* ── Member card ── */
  .member-card {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px 13px 0;
    margin: 0 16px 6px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    border-left-width: 4px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .member-card:hover { background: var(--surface2); }
  .member-card.fronting { border-left-color: var(--fronting); }
  .member-card.not-fronting { border-left-color: var(--border); }

  .avatar-wrap {
    width: 48px; height: 48px; flex-shrink: 0;
    margin-left: 14px;
  }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    object-fit: cover; display: block;
  }
  .avatar-placeholder {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--muted);
  }

  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-size: 15px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-sub {
    font-size: 12px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* fronting indicator pill */
  .front-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    padding: 3px 9px; border-radius: 20px;
    background: rgba(74,222,128,0.15);
    color: #4ade80;
    display: none;
  }
  .member-card.fronting .front-badge { display: block; }

  /* toggle button */
  .toggle-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
    padding: 0;
  }
  .toggle-btn:hover { background: var(--border); color: var(--text); }
  .member-card.fronting .toggle-btn {
    background: rgba(74,222,128,0.15);
    border-color: rgba(74,222,128,0.4);
    color: #4ade80;
  }
  .toggle-btn.loading { opacity: 0.4; pointer-events: none; }

  /* ── Status bar ── */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  #status-bar .fronting-count { color: var(--fronting); font-weight: 700; }
  .logout-btn {
    font-size: 12px; color: var(--muted); background: none; border: none;
    cursor: pointer; font-family: var(--font); text-decoration: underline;
  }

  /* ── Search bar ── */
  .search-wrap { padding: 12px 16px 4px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── Loading spinner ── */
  #loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; padding: 80px 20px;
  }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 14px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    white-space: nowrap; z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { color: #f87171; border-color: rgba(248,113,113,0.3); }
  #toast.success { color: #4ade80; border-color: rgba(74,222,128,0.3); }

  .pb-safe { padding-bottom: 52px; }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <div class="logo" style="margin-bottom:16px; width:44px; height:44px; font-size:22px;">🐙</div>
    <h2>PK Fronter</h2>
    <p>Connect to your PluralKit system to track fronting. Get your token by running <code>pk;token</code> in Discord.</p>
    <div class="field">
      <label>System Token</label>
      <input type="password" id="token-input" placeholder="Paste your PluralKit token…" autocomplete="off">
    </div>
    <button class="btn-primary" id="connect-btn">Connect</button>
    <p class="err" id="setup-err"></p>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">🐙</div>
    <div>
      <h1>PK Fronter</h1>
      <div class="subtitle" id="system-name">Loading…</div>
    </div>
    <div class="header-right">
      <div class="system-tag" id="system-id-tag">—</div>
    </div>
  </header>

  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search members…">
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <span style="color:var(--muted);font-size:14px;">Loading members…</span>
  </div>

  <div id="member-list" class="pb-safe"></div>
</div>

<div id="status-bar" style="display:none;">
  <span>
    <span class="fronting-count" id="front-count">0</span> currently fronting
  </span>
  <button class="logout-btn" id="logout-btn">Sign out</button>
</div>

<div id="toast"></div>

<script>
const PK = 'https://api.pluralkit.me/v2';
let TOKEN = '';
let systemData = null;
let members = [];
let fronters = new Set(); // set of member UUIDs
let currentSwitch = null; // the latest switch object

async function pkFetch(path, opts = {}) {
  const res = await fetch(PK + path, {
    ...opts,
    headers: {
      'Authorization': TOKEN,
      'Content-Type': 'application/json',
      'User-Agent': 'pk-fronter-webapp/1.0',
      ...(opts.headers || {}),
    }
  });
  if (res.status === 204) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 2800);
}

// ── Setup ──────────────────────────────────────────────────────────────────

document.getElementById('connect-btn').addEventListener('click', async () => {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  TOKEN = val;
  const btn = document.getElementById('connect-btn');
  btn.textContent = 'Connecting…';
  btn.disabled = true;
  const errEl = document.getElementById('setup-err');
  errEl.style.display = 'none';
  try {
    await loadApp();
    localStorage.setItem('pk_token', TOKEN);
  } catch(e) {
    errEl.textContent = 'Could not connect: ' + e.message;
    errEl.style.display = 'block';
    TOKEN = '';
  } finally {
    btn.textContent = 'Connect';
    btn.disabled = false;
  }
});

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('connect-btn').click();
});

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('pk_token');
  location.reload();
});

// ── Load app ───────────────────────────────────────────────────────────────

async function loadApp() {
  // Fetch system, members, and current fronters in parallel
  const [sys, mems, sw] = await Promise.all([
    pkFetch('/systems/@me'),
    pkFetch('/systems/@me/members'),
    pkFetch('/systems/@me/fronters').catch(() => null),
  ]);

  systemData = sys;
  members = mems.sort((a, b) => (a.display_name || a.name).localeCompare(b.display_name || b.name));
  currentSwitch = sw;
  fronters = new Set((sw?.members || []).map(m => m.uuid || m));

  // Show app UI
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('status-bar').style.display = 'flex';
  document.getElementById('loading').style.display = 'none';

  // Fill header
  document.getElementById('system-name').textContent = sys.name || 'Unnamed System';
  document.getElementById('system-id-tag').textContent = sys.id;

  renderMembers();
  updateCount();
}

// ── Render ─────────────────────────────────────────────────────────────────

function renderMembers(query = '') {
  const list = document.getElementById('member-list');
  list.innerHTML = '';

  const q = query.toLowerCase();
  const filtered = q
    ? members.filter(m => (m.display_name || m.name).toLowerCase().includes(q))
    : members;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No members found.</div>';
    return;
  }

  // Sort: fronting first, then alphabetical
  const sorted = [...filtered].sort((a, b) => {
    const af = fronters.has(a.uuid) ? 0 : 1;
    const bf = fronters.has(b.uuid) ? 0 : 1;
    if (af !== bf) return af - bf;
    return (a.display_name || a.name).localeCompare(b.display_name || b.name);
  });

  // Section labels
  const frontingNow = sorted.filter(m => fronters.has(m.uuid));
  const notFronting = sorted.filter(m => !fronters.has(m.uuid));

  if (frontingNow.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Fronting now';
    list.appendChild(lbl);
    frontingNow.forEach(m => list.appendChild(makeCard(m)));
  }

  if (notFronting.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Not fronting';
    list.appendChild(lbl);
    notFronting.forEach(m => list.appendChild(makeCard(m)));
  }
}

function makeCard(member) {
  const isFronting = fronters.has(member.uuid);
  const name = member.display_name || member.name;
  const color = member.color ? '#' + member.color : null;

  const card = document.createElement('div');
  card.className = 'member-card ' + (isFronting ? 'fronting' : 'not-fronting');
  card.dataset.uuid = member.uuid;
  if (color) card.style.borderLeftColor = color;

  // Avatar
  const avatarWrap = document.createElement('div');
  avatarWrap.className = 'avatar-wrap';
  if (member.avatar_url) {
    const img = document.createElement('img');
    img.src = member.avatar_url;
    img.alt = name;
    img.className = 'avatar';
    img.onerror = () => avatarWrap.replaceChildren(makePlaceholder(name, color));
    avatarWrap.appendChild(img);
  } else {
    avatarWrap.appendChild(makePlaceholder(name, color));
  }

  // Info
  const info = document.createElement('div');
  info.className = 'member-info';
  const nameEl = document.createElement('div');
  nameEl.className = 'member-name';
  nameEl.textContent = name;
  if (color) nameEl.style.color = color;
  info.appendChild(nameEl);

  const sub = [];
  if (member.pronouns) sub.push(member.pronouns);
  const subEl = document.createElement('div');
  subEl.className = 'member-sub';
  subEl.textContent = sub.join(' · ') || member.id;
  info.appendChild(subEl);

  // Right side
  const right = document.createElement('div');
  right.className = 'card-right';
  right.style.marginRight = '12px';

  const badge = document.createElement('div');
  badge.className = 'front-badge';
  badge.textContent = 'Fronting';

  const btn = document.createElement('button');
  btn.className = 'toggle-btn';
  btn.title = isFronting ? 'Remove from front' : 'Add to front';
  btn.innerHTML = isFronting ? '−' : '+';
  btn.addEventListener('click', e => { e.stopPropagation(); toggleFront(member.uuid, btn); });

  right.appendChild(badge);
  right.appendChild(btn);

  card.appendChild(avatarWrap);
  card.appendChild(info);
  card.appendChild(right);

  return card;
}

function makePlaceholder(name, color) {
  const el = document.createElement('div');
  el.className = 'avatar-placeholder';
  el.textContent = (name || '?')[0].toUpperCase();
  if (color) {
    el.style.background = color + '22';
    el.style.color = color;
    el.style.border = `1px solid ${color}44`;
  }
  return el;
}

function updateCount() {
  document.getElementById('front-count').textContent = fronters.size;
}

// ── Search ─────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', e => {
  renderMembers(e.target.value);
});

// ── Toggle front ───────────────────────────────────────────────────────────

async function toggleFront(uuid, btn) {
  btn.classList.add('loading');

  const isFronting = fronters.has(uuid);

  try {
    let newMembers;
    if (isFronting) {
      newMembers = [...fronters].filter(id => id !== uuid);
    } else {
      newMembers = [...fronters, uuid];
    }

    // POST a new switch with the updated member list
    const result = await pkFetch('/systems/@me/switches', {
      method: 'POST',
      body: JSON.stringify({ members: newMembers }),
    });

    fronters = new Set(newMembers);
    currentSwitch = result;

    updateCount();
    renderMembers(document.getElementById('search').value);
    toast(isFronting ? 'Removed from front' : 'Added to front', 'success');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    btn.classList.remove('loading');
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────

const saved = localStorage.getItem('pk_token');
if (saved) {
  TOKEN = saved;
  loadApp().catch(e => {
    localStorage.removeItem('pk_token');
    TOKEN = '';
    document.getElementById('setup').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  });
} else {
  document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
